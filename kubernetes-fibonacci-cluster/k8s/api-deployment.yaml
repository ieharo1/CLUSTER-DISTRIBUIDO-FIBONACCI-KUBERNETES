apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibonacci-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fibonacci-api
  template:
    metadata:
      labels:
        app: fibonacci-api
    spec:
      containers:
        - name: api
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: QUEUE_NAME
              value: cola_fibonacci
            - name: RESULT_TTL_SECONDS
              value: "3600"
          volumeMounts:
            - name: api-code
              mountPath: /app/main.py
              subPath: main.py
          workingDir: /app
          command: ["sh", "-c"]
          args:
            - |
              pip install --no-cache-dir fastapi uvicorn redis && \
              uvicorn main:app --host 0.0.0.0 --port 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: api-code
          configMap:
            name: fibonacci-api-code
---
apiVersion: v1
kind: Service
metadata:
  name: fibonacci-api
spec:
  selector:
    app: fibonacci-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
  type: NodePort

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fibonacci-api-code
data:
  main.py: |
    import json
    import os
    import uuid

    import redis
    from fastapi import FastAPI, HTTPException, Query

    app = FastAPI(title="Kubernetes Fibonacci Cluster", version="1.0.0")

    REDIS_HOST = os.getenv("REDIS_HOST", "redis")
    REDIS_PORT = int(os.getenv("REDIS_PORT", "6379"))
    QUEUE_NAME = os.getenv("QUEUE_NAME", "cola_fibonacci")
    RESULT_PREFIX = os.getenv("RESULT_PREFIX", "fibonacci:result:")
    RESULT_TTL_SECONDS = int(os.getenv("RESULT_TTL_SECONDS", "3600"))

    r = redis.Redis(host=REDIS_HOST, port=REDIS_PORT, decode_responses=True)


    @app.get("/health")
    def health():
        try:
            r.ping()
            return {"status": "ok", "redis": "ok"}
        except Exception:
            return {"status": "degraded", "redis": "down"}


    @app.post("/fibonacci")
    def calcular_fibonacci(
        numero: int = Query(..., ge=0, le=40, description="Numero para calcular Fibonacci (0..40)"),
    ):
        task_id = str(uuid.uuid4())
        tarea = {"id": task_id, "numero": numero}

        r.rpush(QUEUE_NAME, json.dumps(tarea))
        r.setex(f"{RESULT_PREFIX}{task_id}:status", RESULT_TTL_SECONDS, "pending")

        return {"mensaje": "tarea enviada", "task_id": task_id}


    @app.get("/resultado/{task_id}")
    def obtener_resultado(task_id: str):
        raw = r.get(f"{RESULT_PREFIX}{task_id}")
        if raw:
            try:
                return json.loads(raw)
            except Exception:
                return {"id": task_id, "status": "done", "resultado": raw}

        status = r.get(f"{RESULT_PREFIX}{task_id}:status") or "pending"
        if status == "pending":
            return {"id": task_id, "status": "pending"}

        raise HTTPException(status_code=404, detail="task_id no encontrado o expirado")
